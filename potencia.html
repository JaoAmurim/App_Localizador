<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potência | Navegação</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Global box-sizing para evitar overflow */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --riofer-blue: #0A1C40;
            --riofer-orange: #FF7F00;
            --background-light: #F2F2F2;
            --map-blue: #007bff;
            --success-green: #28a745;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-light);
            color: var(--riofer-blue);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }
        .info-box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: var(--riofer-orange);
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        p.subtitle {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
        .reference {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.05s ease;
            border: none;
            position: relative;
        }
        .btn-maps {
            background-color: var(--map-blue);
            color: white;
            box-shadow: 0 6px 12px rgba(0, 123, 255, 0.18);
        }
        .btn-waze {
            background-color: var(--success-green);
            color: white;
            box-shadow: 0 6px 12px rgba(40, 167, 69, 0.18);
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .back-link {
            margin-top: 15px;
            font-size: 0.8em;
            color: #6c757d;
        }
        .back-link a {
            color: var(--riofer-blue);
            font-weight: 600;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="info-box">
        <h1>RIOFER POTÊNCIA</h1>
        <p class="subtitle">Selecione seu navegador:</p>
        
        <div class="reference">
            PONTO DE REFERÊNCIA: Na Rodovia SP-207, dentro do POSTO POTÊNCIA, atrás da Riolog.
        </div>

        <a href="https://maps.app.goo.gl/FHMtRYrRUfdAXuXdA" target="_blank" rel="noopener noreferrer" class="btn btn-maps" role="button" aria-label="Abrir no Google Maps">
            Abrir no GOOGLE MAPS
        </a>

        <a href="https://www.waze.com/en/live-map/directions?latlng=-21.63362383862603%2C-46.89466285447108" target="_blank" rel="noopener noreferrer" class="btn btn-waze" role="button" aria-label="Abrir no Waze">
            Abrir no WAZE
        </a>

        <p class="back-link">
            <a href="index.html">Voltar para a Seleção de Destino</a>
        </p>
    </div>

</body>
</html>
