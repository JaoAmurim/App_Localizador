<!DOCTYPE html>
<html lang="pt-BR">

  <head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="mobile-web-app-capable" content="yes">

    <meta name="theme-color" content="#0A1C40">
    <title>Paula Lima | Navegação</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
      /* Variáveis de Cor (Riofer Palette) */
      :root {
        --riofer-blue: #0A1C40;
        /* Azul Escuro (Principal/Texto) */
        --riofer-orange: #FF7F00;
        /* Laranja Riofer (Destaque/Alerta) */
        --background-light: #F2F2F2;
        /* Fundo Geral */
        --map-color: #4285F4;
        /* Azul Google Maps */
        --waze-color: #2DC653;
        /* Verde Waze (Mais vibrante que o anterior) */
        --shadow-depth: 4px;
        /* Profundidade da sombra do botão */
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--background-light);
        color: var(--riofer-blue);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
      }

      /* 1. Novo Header Fixo para Visual de App */
      .header {
        background-color: var(--riofer-blue);
        color: white;
        padding: 20px 15px;
        font-weight: 800;
        font-size: 1.2em;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
      }

      /* 2. Box Principal */
      .info-box {
        background-color: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: calc(100% - 40px);
        text-align: center;
        margin-bottom: 20px;
      }

      h1 {
        color: var(--riofer-orange);
        font-size: 1.8em;
        font-weight: 800;
        margin-bottom: 5px;
      }

      p.subtitle {
        font-weight: 600;
        font-size: 1.1em;
        margin-bottom: 25px;
        color: var(--riofer-blue);
      }

      /* Ponto de Referência */
      .reference {
        background-color: #fff3cd;
        color: #856404;
        padding: 10px;
        border-radius: 8px;
        font-size: 0.9em;
        margin-bottom: 25px;
        font-weight: 600;
        border: 1px solid #ffc107;
        text-align: center;
      }

      /* Botões de Navegação - Design Pressionável Aprimorado */
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        /* Centraliza o bloco (Img + Span) */
        width: 100%;
        padding: 18px;
        margin-bottom: 20px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 1.1em;
        font-weight: 800;
        text-transform: uppercase;
        transition: all 0.05s ease;
        border: none;
        position: relative;
      }

      /* CORREÇÃO PRINCIPAL: Permite que o texto se expanda e centralize dentro do espaço restante */
      .btn span {
        display: inline-block;
        text-align: center;
        flex-grow: 1;
        /* Faz com que este elemento ocupe o espaço disponível, forçando o ícone para a esquerda */
      }

      /* Garante que o ícone não seja comprimido */
      .btn img {
        flex-shrink: 0;
        margin-right: 10px;
      }

      /* 3. CORES E SOMBRAS RIOFER/MAPS/WAZE */
      .btn-maps {
        background-color: var(--map-color);
        color: white;
        box-shadow: 0 var(--shadow-depth) #3b76d0;
      }

      .btn-waze {
        background-color: var(--waze-color);
        color: white;
        box-shadow: 0 var(--shadow-depth) #229944;
      }

      .btn:active {
        /* Pressionar o botão */
        transform: translateY(var(--shadow-depth));
        box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
        /* Sombra desaparece */
      }

      /* Link de Retorno */
      .back-link {
        margin-top: 15px;
        font-size: 0.9em;
        color: #6c757d;
        text-align: center;
      }

      .back-link a {
        color: var(--riofer-blue);
        font-weight: 600;
        text-decoration: none;
      }

      .back-link a:hover {
        text-decoration: underline;
      }
    </style>

  </head>

  <body>

    <div class="header">
      RIOFER PAULA LIMA
    </div>

    <div class="info-box">
      <h1>PAULA LIMA</h1>
      <p class="subtitle">Entrega / Recebimento de Materiais</p>

      <p class="subtitle">Selecione seu navegador:</p>

      <div class="reference">
        📍 PONTO DE REFERÊNCIA: Em frente à Igreja do Bairro Paula Lima.
      </div>

      <a href="https://maps.app.goo.gl/p6SYegzZ6xo34o8n8" target="_blank" class="btn btn-maps">
        <img src="https://i.imgur.com/v8tTj0V.png" alt="Google Maps Icon" style="width: 24px; margin-right: 10px;">
        <span>Abrir no GOOGLE MAPS</span>
      </a>

      <a href="https://www.waze.com/en/live-map/directions/br/sp/riofer-metais-tecnologia-em-aco?place=ChIJLxXLagDTt5QRK-XWlnJIbD8" target="_blank" class="btn btn-waze">
        <img src="https://i.imgur.com/uTjN0R9.png" alt="Waze Icon" style="width: 24px; margin-right: 10px;">
        <span>Abrir no WAZE</span>
      </a>

      <p class="back-link">
        <a href="index.html">← Voltar para a Seleção de Destino</a>
      </p>
    </div>

  </body>

</html>
