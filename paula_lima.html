<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paula Lima | Navegação</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --riofer-blue: #0A1C40;
            --riofer-orange: #FF7F00;
            --background-light: #F2F2F2;
            --success-green: #28a745;
            --map-blue: #007bff;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-light);
            color: var(--riofer-blue);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }
        .info-box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: var(--riofer-orange);
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        p.subtitle {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
        .reference {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 800;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .btn-maps {
            background-color: var(--map-blue);
            color: white;
            box-shadow: 0 4px #0056b3;
        }
        .btn-waze {
            background-color: var(--success-green);
            color: white;
            box-shadow: 0 4px #1e7e34;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="info-box">
        <h1>RIOFER PAULA LIMA</h1>
        <p class="subtitle">Selecione seu navegador:</p>
        
        <div class="reference">
            PONTO DE REFERÊNCIA: Em frente à Igreja do Bairro Paula Lima.
        </div>

        <a href="https://maps.app.goo.gl/p6SYegzZ6xo34o8n8" target="_blank" class="btn btn-maps">
            Abrir no GOOGLE MAPS
        </a>

        <a href="https://www.waze.com/en/live-map/directions/br/sp/riofer-metais-tecnologia-em-aco?place=ChIJLxXLagDTt5QRK-XWlnJIbD8" target="_blank" class="btn btn-waze">
            Abrir no WAZE
        </a>

        <p style="margin-top: 20px; font-size: 0.8em; color: #6c757d;">
            Voltar para a <a href="index.html">Seleção de Destino</a>
        </p>
    </div>

</body>
</html>
