<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A1C40">
    <title>Riofer | Navegação Fácil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Cor (Riofer Palette) */
        :root {
            --riofer-blue: #0A1C40; /* Azul Escuro (Principal) */
            --riofer-orange: #FF7F00; /* Laranja Riofer (Destaque/Nota) */
            --background-light: #F2F2F2; /* Fundo Geral */
            --text-color-light: #F2F2F2;
            --text-color-dark: #343a40;
            --card-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-light);
            color: var(--text-color-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER - Visual de Barra de Navegação Fixa (App) */
        .header {
            background-color: var(--riofer-blue);
            color: var(--text-color-light);
            padding: 20px 15px;
            font-weight: 800;
            font-size: 1.2em;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: normal;
            line-height: 1.3;
            /* ADICIONADO: Margem inferior para dar mais espaço do conteúdo abaixo */
            margin-bottom: 5px; 
        }
        
        /* NOVO ESTILO: Título 'Selecione seu Destino' */
        .page-title {
            color: var(--riofer-blue);
            font-weight: 800;
            font-size: 1.5em; /* Tamanho bom para destaque */
            margin: 20px 0 15px 0; /* Margem superior e inferior */
            text-align: center;
            width: 100%;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 0 15px 15px 15px; /* Ajuste: Removido padding superior para deixar o título se encaixar */
            box-sizing: border-box;
            flex-grow: 1;
        }

        /* 3 COLUNAS SEMPRE */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto; /* Removida a margem superior de 20px aqui, transferida para .page-title */
            padding-bottom: 20px; /* Espaço antes da nota */
        }

        /* Media query para telas maiores */
        @media (min-width: 600px) {
             .card-grid {
                gap: 20px;
                max-width: 600px;
            }
            .header {
                font-size: 1.5em;
            }
            .page-title {
                font-size: 1.8em;
            }
        }

        /* Estilo dos Cards de Navegação */
        .nav-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s;
            height: 100%;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .nav-card:active {
            transform: scale(0.96);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            background-color: #f0f0f0;
        }

        /* Ícones */
        .card-image {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 0.85em;
            font-weight: 700;
            color: var(--riofer-blue);
            margin: 0;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .card-subtitle {
            font-size: 0.7em;
            color: #6c757d;
            margin-top: 2px;
            text-align: center;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* NOTA DE DESTAQUE - Laranja Riofer */
        .note {
            /* Removido margin-top para que a nota fique logo após o grid */
            margin: 0 auto 20px auto; 
            padding: 15px;
            background-color: var(--riofer-orange); /* Usando Laranja Riofer */
            color: var(--riofer-blue);
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            border: 1px solid #FF9933; /* Uma cor mais clara da paleta para a borda */
            text-align: left;
            width: calc(100% - 30px);
            max-width: 400px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="header">
        RIOFER | NAVEGAÇÃO RÁPIDA
    </div>

    <div class="main-content">
        <h2 class="page-title">
            Selecione seu Destino
        </h2>

        <div class="card-grid">

            <a href="balanca.html" class="nav-card">
                <img src="img/pngtree-mouse-hand-click-image_2281134.jpg" alt="Ícone de Balança" class="card-image">
                <div class="card-content">
                    <p class="card-title" align="center"> BALANÇA RIOFER </p>
                    <p class="card-subtitle"> Pesagem / Saída de Cargas </p>
                </div>
            </a>

            <a href="paula_lima.html" class="nav-card">
                <img src="img/pngtree-mouse-hand-click-image_2281134.jpg" alt="Ícone de Entrega" class="card-image">
                <div class="card-content">
                    <p class="card-title" align="center"> RIOFER PAULA LIMA </p>
                    <p class="card-subtitle"> Entrega / Recebimento de Materiais </p>
                </div>
            </a>

            <a href="potencia.html" class="nav-card">
                <img src="img/pngtree-mouse-hand-click-image_2281134.jpg" alt="Ícone de Sede Principal" class="card-image">
                <div class="card-content">
                    <p class="card-title" align="center"> RIOFER POTÊNCIA </p>
                    <p class="card-subtitle"> Escritórios / RH </p>
                </div>
            </a>

        </div>

        <div class="note">
            ✅ **IMPORTANTE:** Após a seleção, você escolherá o aplicativo (Maps ou Waze) para iniciar a rota.
        </div>
    </div>

</body>

</html>
