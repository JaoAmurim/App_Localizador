<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riofer | Selecione Seu Destino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Cor */
        :root {
            --riofer-blue: #0A1C40; 
            --riofer-orange: #FF7F00; 
            --background-light: #F2F2F2; 
            --text-color-light: #F2F2F2;
            --text-color-dark: #343a40;
            --card-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--riofer-blue);
            color: var(--text-color-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            /* Reduzido de 10px para 5px para preencher mais a largura */
            padding: 5px; 
        }

        h1 {
            color: var(--text-color-light);
            margin-bottom: 20px; 
            padding-top: 15px; 
            /* AUMENTADO para dar mais impacto visual no topo */
            font-size: 1.8em; 
            font-weight: 800;
        }

        /* 3 COLUNAS SEMPRE */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            /* Reduzido de 10px para 8px para preencher mais */
            gap: 8px; 
            padding: 10px 0; 
        }

        /* Layout para telas maiores */
        @media (min-width: 600px) {
             .card-grid {
                gap: 20px;
            }
            h1 {
                font-size: 2.2em;
            }
        }

        /* Estilo dos Cards de Navegação */
        .nav-card {
            background: white;
            border-radius: 12px; 
            box-shadow: var(--card-shadow);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Padding vertical aumentado para preencher mais */
            padding: 20px 5px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.1s;
            height: 100%;
        }
        
        /* Efeito de Clique Mobile */
        .nav-card:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            background-color: var(--background-light);
        }

        .nav-card:hover {
            transform: scale(1.05); 
            box-shadow: 0 8px 15px rgba(255, 127, 0, 0.3);
            cursor: pointer;
        }

        /* Imagens (Ícones) - AUMENTADO para preencher mais */
        .card-image {
            width: 65px; 
            height: 65px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .card-title {
            /* Levemente maior */
            font-size: 0.9em; 
            font-weight: 700;
            color: var(--riofer-blue);
            margin: 0;
            text-transform: uppercase;
        }

        .card-subtitle {
            font-size: 0.75em; /* Levemente maior */
            color: #6c757d;
            margin-top: 2px;
            text-align: center;
            word-wrap: break-word; 
        }

        /* Dica de Notificação */
        .note {
            margin-top: 25px;
            padding: 15px;
            background-color: #ffc107; 
            color: var(--riofer-blue);
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            border: 1px solid #e0a800;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>SELECIONE SEU DESTINO</h1>

        <div class="card-grid">

            <a href="balanca.html" class="nav-card">
                <img src="img/pngtree-mouse-hand-click-image_2281134.jpg" alt="Ícone de Balança" class="card-image">
                <div class="card-content">
                    <p class="card-title">BALANÇA RIOFER</p>
                    <p class="card-subtitle">Pesagem / Saída</p> 
                </div>
            </a>

            <a href="paula_lima.html" class="nav-card">
                <img src="img/pngtree-mouse-hand-click-image_2281134.jpg" alt="Ícone de Entrega" class="card-image">
                <div class="card-content">
                    <p class="card-title">PAULA LIMA</p>
                    <p class="card-subtitle">Entrega / Recebimento</p>
                </div>
            </a>

            <a href="potencia.html" class="nav-card">
                <img src="img/pngtree-mouse-hand-click-image_2281134.jpg" alt="Ícone de Sede Principal" class="card-image">
                <div class="card-content">
                    <p class="card-title">RIOFER POTÊNCIA</p>
                    <p class="card-subtitle">Escritórios / Sede</p>
                </div>
            </a>

        </div>


        <br>
        
        <div class="note">
            ✅ **DICA:** Para uma navegação mais precisa, certifique-se de ter o Google Maps ou Waze instalado e ativo no seu celular.
        </div>
    </div>

</body>

</html>
